<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lustria&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/no-styles.css" />
    <link rel="stylesheet" href="/static/styles.css" />
    {% block css %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="body__login body__main">

{% if session["user_id"] %}
    <header>
      <div class="header">
        <p class="header__logo"><a href="{{ url_for('index') }}">Time Tracker</a></p>
        <nav class="header__nav">

          <ul>
            {% if active_page == "tasks" %}
            <li><a href="{{ url_for('index') }}">Home</a></li>
            {% else %}
            <li><a href="{{ url_for('tasks') }}">Tasks</a></li>
            {% endif %}
            <li><a href="{{ url_for('planner') }}">Planner</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
          </ul>

        </nav>
      </div>
    </header>
    {% endif %}
    <main>
      <div class="main__wrapper">{% block main %}{% endblock %}</div></main>

    <footer>
      <div class="footer__wrapper">
        <p>Time Tracker</p>
        <p>by Helen Kohun</p>
      </div>

    </footer>



    {% block scripts %}{% endblock%}
  </body>
</html>
